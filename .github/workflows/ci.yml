name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install tmux
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y tmux
          else
            brew install tmux
          fi
      - run: cargo test

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy -- -D warnings

  deny:
    name: Supply Chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2.0.17

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Check CLI docs are up-to-date
        run: |
          cargo xtask gen-docs
          git diff --exit-code docs/cli/reference.md \
            || (echo "::error::CLI docs are out of date. Run 'cargo xtask gen-docs' and commit." && exit 1)

  skill:
    name: Skill Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Check skill file references valid CLI commands
        run: cargo xtask check-skill

  nix:
    name: Nix Eval
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035 # v34
      - name: Evaluate flake outputs (all systems)
        run: |
          set -euo pipefail
          nix --version

          echo "=== Flake metadata ==="
          nix flake metadata

          echo ""
          echo "=== Flake structure ==="
          nix flake show --all-systems

          SYSTEMS="x86_64-linux aarch64-linux x86_64-darwin aarch64-darwin"

          echo ""
          echo "=== Evaluating packages for all systems ==="
          for system in $SYSTEMS; do
            echo ""
            echo "--- $system ---"
            for pkg in default aoe-with-web; do
              printf "  %s: " "$pkg"
              if output=$(nix eval ".#packages.$system.$pkg.drvPath" --raw 2>&1); then
                echo "✓"
              else
                echo "✗"
                echo "::error::Evaluation failed for packages.$system.$pkg"
                echo "$output"
                exit 1
              fi
            done
          done

          echo ""
          echo "=== Evaluating devShells for all systems ==="
          for system in $SYSTEMS; do
            printf "%s: " "$system"
            if output=$(nix eval ".#devShells.$system.default.drvPath" --raw 2>&1); then
              echo "✓"
            else
              echo "✗"
              echo "::error::Evaluation failed for devShells.$system.default"
              echo "$output"
              exit 1
            fi
          done

          echo ""
          echo "=== All evaluations passed ==="

  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Run Vitest unit tests
        working-directory: web
        run: npm run test:unit

  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install dependencies and build
        working-directory: web
        run: npm ci && npm run build
      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: web
        run: npx playwright test
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14

  website:
    name: Website Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install and build
        working-directory: website
        run: npm install && npm run build
