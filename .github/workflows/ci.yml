name: CI

on:
  push:
    branches: [main, cockpit-main]
  pull_request:
    branches: [main, cockpit-main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: "false"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy -- -D warnings
      - name: file_watch consolidation guard
        run: |
          set -euo pipefail
          hits="$(grep -rl 'notify::recommended_watcher' src/ || true)"
          unexpected="$(printf '%s\n' "$hits" | grep -v '^src/file_watch.rs$' | grep . || true)"
          if [ -n "$unexpected" ]; then
            echo "::error::New notify::recommended_watcher found outside src/file_watch.rs:"
            printf '%s\n' "$unexpected"
            exit 1
          fi

  deny:
    name: Supply Chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: EmbarkStudios/cargo-deny-action@a531616d8ce3b9177443e48a1159bc945a099823 # v2.0.19

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: "false"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Check CLI docs are up-to-date
        run: |
          cargo xtask gen-docs
          git diff --exit-code docs/cli/reference.md \
            || (echo "::error::CLI docs are out of date. Run 'cargo xtask gen-docs' and commit." && exit 1)

  skill:
    name: Skill Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: "false"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Check skill file references valid CLI commands
        run: cargo xtask check-skill

  nix:
    name: Nix Eval
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035 # v34
      - name: Evaluate flake outputs (all systems)
        run: |
          set -euo pipefail
          nix --version

          echo "=== Flake metadata ==="
          nix flake metadata

          echo ""
          echo "=== Flake structure ==="
          nix flake show --all-systems

          SYSTEMS="x86_64-linux aarch64-linux x86_64-darwin aarch64-darwin"

          echo ""
          echo "=== Evaluating packages for all systems ==="
          for system in $SYSTEMS; do
            echo ""
            echo "--- $system ---"
            for pkg in default aoe-with-web; do
              printf "  %s: " "$pkg"
              if output=$(nix eval ".#packages.$system.$pkg.drvPath" --raw 2>&1); then
                echo "✓"
              else
                echo "✗"
                echo "::error::Evaluation failed for packages.$system.$pkg"
                echo "$output"
                exit 1
              fi
            done
          done

          echo ""
          echo "=== Evaluating devShells for all systems ==="
          for system in $SYSTEMS; do
            printf "%s: " "$system"
            if output=$(nix eval ".#devShells.$system.default.drvPath" --raw 2>&1); then
              echo "✓"
            else
              echo "✗"
              echo "::error::Evaluation failed for devShells.$system.default"
              echo "$output"
              exit 1
            fi
          done

          echo ""
          echo "=== All evaluations passed ==="

  nix-build-web:
    name: Nix Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Catches npmDepsHash desync at PR time even if the nix-npm-hash bot
    # is offline. Path-gated so Rust-only PRs keep fast feedback.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect relevant changes
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          EVENT_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE="origin/$BASE_REF"
          else
            # `github.event.before` is the SHA before the push, which
            # covers multi-commit pushes correctly. Falls back to the
            # empty tree on the initial-push edge case (`before` is all
            # zeros, no `HEAD~1` exists yet) so the diff still resolves.
            if [ -z "$EVENT_BEFORE" ] || [ "$EVENT_BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BASE=$(git hash-object -t tree /dev/null)
            else
              BASE="$EVENT_BEFORE"
            fi
          fi
          if git diff --name-only "$BASE"...HEAD \
            | grep -E '^(web/package-lock\.json|flake\.nix|flake\.lock)$' \
            >/dev/null; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035 # v34
        if: steps.changes.outputs.relevant == 'true'

      - name: Build aoe-web-frontend
        if: steps.changes.outputs.relevant == 'true'
        # Builds only the npm + vite frontend (validates npmDepsHash
        # as a side effect). Skips the full Rust crate so this job
        # runs in 1-2 min instead of 20-30 min; Cargo Test + Nix Eval
        # already cover the Rust side on every PR.
        run: |
          set -euo pipefail
          nix build --no-link .#packages.x86_64-linux.aoe-web-frontend

  website:
    name: Website Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install and build
        working-directory: website
        run: npm install && npm run build
