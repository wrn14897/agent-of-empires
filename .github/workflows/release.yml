name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  # Centralizes the "which ref do we operate on" rule so every job's checkout
  # stays in sync. Without this, workflow_dispatch silently fell back to main:
  # checkout's default ref ignored the `tag` input, so validation read main's
  # Cargo.toml and the build packaged main's binary while attaching it to the
  # requested tag's release.
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

jobs:
  validate:
    name: Validate Version
    runs-on: ubuntu-latest
    # Required-reviewer gate. Pauses every release (tag push or manual
    # dispatch) until njbrake approves in the Actions UI. The whole pipeline
    # waits here, so no build compute or release publish runs without sign-off.
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_REF }}
          # No job here pushes back to the repo; the Release is created via
          # softprops/action-gh-release using its own GITHUB_TOKEN. Skip the
          # default credential-persistence to shrink the token surface.
          persist-credentials: false

      - name: Validate version matches tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          TAG_VERSION="${TAG#v}"
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version: $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch! Cargo.toml has $CARGO_VERSION but tag is $TAG"
            echo "Use the 'Prepare Release' workflow to bump the version automatically."
            echo "Or manually update Cargo.toml and Cargo.lock to version $TAG_VERSION before tagging."
            exit 1
          fi
          echo "✓ Versions match"

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.os }}
    # Linux jobs build inside manylinux_2_28 containers (AlmaLinux 8 base,
    # glibc 2.28) so the released binary runs on every common server distro
    # from RHEL 8 / Ubuntu 20.04 / Debian 11 / Amazon Linux 2 forward, instead
    # of failing on anything older than ubuntu-24.04's glibc 2.39. macOS jobs
    # leave `matrix.container` unset and run directly on the runner host.
    # See issue #1578 and Kobzol's "Building Rust binaries in CI that work
    # with older GLIBC" for context. If the manylinux base is ever bumped,
    # bump LINUX_GLIBC_FLOOR below, MIN_GLIBC in scripts/install.sh, and the
    # Prerequisites note in docs/installation.md in the same PR.
    container: ${{ matrix.container }}
    env:
      LINUX_GLIBC_FLOOR: '2.28'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: aoe-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: aoe-darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            container: quay.io/pypa/manylinux_2_28_x86_64
            name: aoe-linux-amd64
          - target: aarch64-unknown-linux-gnu
            # GitHub-hosted arm64 runner (free for public repos since 2025-08).
            # Building natively here means we don't need a cross-toolchain
            # inside the container.
            os: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            name: aoe-linux-arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_REF }}
          persist-credentials: false

      - name: Install container build dependencies (Linux)
        if: matrix.container != ''
        run: |
          # manylinux_2_28 is AlmaLinux 8 (dnf-based). The image ships gcc,
          # binutils, make, and core perl already; we add git for cargo's
          # git deps, xz for tarball decompression, and three perl pieces
          # that AlmaLinux 8's minimal perl install does NOT include but
          # this workflow needs:
          #   perl-IPC-Cmd     - openssl-src Configure step (config.pm)
          #   perl-Time-Piece  - openssl-src Makefile.in line 37
          #   perl-Digest-SHA  - provides the `shasum` command used to
          #                      write the .sha256 file in Package step
          # All three are in Ubuntu's perl-base by default, which is why
          # the previous ubuntu-latest runner build didn't trip on any
          # of them. FindBin and other standard Perl modules are in the
          # base `perl` package on AlmaLinux 8, no separate install.
          dnf install -y --setopt=install_weak_deps=False \
            git curl tar gzip xz \
            perl-IPC-Cmd perl-Time-Piece perl-Digest-SHA
          # Node 22 via NodeSource. Node 22 requires glibc 2.28+, which is
          # exactly what manylinux_2_28 ships, so this resolves cleanly.
          curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
          dnf install -y nodejs

      - name: Setup Node.js (macOS)
        if: matrix.container == ''
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Build web frontend
        run: cd web && npm install && npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --features serve --target ${{ matrix.target }}

      - name: Verify Linux binary glibc floor
        if: matrix.container != ''
        run: |
          # Hard CI guard against the same regression that produced #1578:
          # if the binary ever requires GLIBC symbols newer than the
          # manylinux base ships, fail the release before publishing.
          # objdump ships in binutils, already present in manylinux_2_28.
          BIN="target/${{ matrix.target }}/release/aoe"
          REQUIRED=$(objdump -T "$BIN" \
              | grep -oE 'GLIBC_[0-9]+\.[0-9]+' \
              | sed 's/GLIBC_//' \
              | sort -uV \
              | tail -1)
          echo "Highest GLIBC symbol required: ${REQUIRED:-<none>}"
          echo "Configured floor:              ${LINUX_GLIBC_FLOOR}"
          if [ -z "$REQUIRED" ]; then
              echo "::warning::No GLIBC symbols found; binary may be statically linked"
              exit 0
          fi
          if [ "$(printf '%s\n%s\n' "$LINUX_GLIBC_FLOOR" "$REQUIRED" | sort -V | tail -1)" != "$LINUX_GLIBC_FLOOR" ]; then
              echo "::error::Binary requires GLIBC_${REQUIRED} but floor is ${LINUX_GLIBC_FLOOR}. The container image or build deps likely changed; bump LINUX_GLIBC_FLOOR + scripts/install.sh MIN_GLIBC + docs/installation.md together, or fix the regression."
              exit 1
          fi

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/aoe dist/${{ matrix.name }}
          cd dist
          tar -czvf ${{ matrix.name }}.tar.gz ${{ matrix.name }}
          # shasum is a perl script that ships in macOS by default and is
          # provided on Linux by perl-Digest-SHA (installed above for the
          # manylinux jobs). Using shasum keeps the command identical on
          # all four matrix entries; sha256sum would work on Linux but is
          # not installed on macOS by default.
          shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.name }}
          path: |
            dist/${{ matrix.name }}.tar.gz
            dist/${{ matrix.name }}.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_REF }}
          persist-credentials: false
          # git cliff --current walks tag-to-tag history; needs full clone.
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2.79.7
        with:
          tool: git-cliff

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "=== Artifacts directory ==="
          ls -laR artifacts/
          echo "=== Finding tar.gz files ==="
          find artifacts -type f -name '*.tar.gz*' | head -20

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        env:
          # git-cliff hits the GitHub API to resolve commit -> PR -> author
          # for the "by @user in #N" lines and the "New Contributors" section.
          # Without a token the calls are unauthenticated and rate-limited to
          # 60/hr, which silently strips attribution when a release has many
          # commits.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git cliff --config cliff.toml --current --strip header > release-notes.md 2> cliff-stderr.log
          echo "=== release-notes.md ==="
          cat release-notes.md
          echo "=== cliff stderr ==="
          cat cliff-stderr.log
          # Belt-and-braces: cliff.toml already routes unmatched commits to
          # the "Other" group via a catch-all parser. If git-cliff still
          # flags a parse-error skip, something fell through the safety net
          # (regex change, parser-order regression, etc.) and we want the
          # release to fail loudly rather than silently lose commits.
          if grep -q "skipped due to parse error" cliff-stderr.log; then
            echo "::error::git-cliff skipped commits due to parse errors. Either fix the offending commit messages or extend cliff.toml's catch-all parser."
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Agent of Empires ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          body_path: release-notes.md
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256

    outputs:
      version: ${{ steps.version.outputs.version }}

  publish-clawhub:
    name: Publish to ClawHub
    needs: release
    runs-on: ubuntu-latest
    env:
      CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_REF }}
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        if: env.CLAWHUB_TOKEN != ''

      - name: Install clawhub CLI
        if: env.CLAWHUB_TOKEN != ''
        run: |
          bun install -g clawhub
          # Workaround: clawhub CLI v0.7.0 doesn't send acceptLicenseTerms
          GLOBAL_DIR="$(bun pm ls -g 2>/dev/null | head -1 | sed 's/ .*//')"
          PUBLISH_JS="${GLOBAL_DIR}/node_modules/clawhub/dist/cli/commands/publish.js"
          sed -i 's/slug,/slug, acceptLicenseTerms: true,/' "$PUBLISH_JS"

      - name: Publish skill
        if: env.CLAWHUB_TOKEN != ''
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          VERSION_NUM="${VERSION#v}"
          clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          clawhub publish contrib/openclaw-skill \
            --slug aoe \
            --name "Agent of Empires" \
            --version "$VERSION_NUM" \
            --tags latest

      - name: Skip notice
        if: env.CLAWHUB_TOKEN == ''
        run: echo "::notice::Skipping ClawHub publish -- CLAWHUB_TOKEN secret not configured"
