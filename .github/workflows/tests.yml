name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  cargo:
    # Job names use the stable `label`, not the runner, so the branch
    # ruleset's required checks ("Cargo Test (linux)" / "Cargo Test
    # (macos)") survive runner swaps. The runner itself comes from a
    # repo Actions variable so Blacksmith can be dropped without a
    # commit when the monthly credit pool runs dry: clearing
    # RUNNER_CARGO_LINUX / RUNNER_CARGO_MACOS in Settings -> Actions ->
    # Variables falls back to the free GitHub-hosted runners on the
    # next run. Jobs already queued for Blacksmith sit "queued"
    # forever (GitHub has no runner fallback primitive), so flip the
    # variable, then re-run the stuck workflow.
    name: Cargo Test (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - label: linux
            os: ${{ vars.RUNNER_CARGO_LINUX || 'ubuntu-latest' }}
          - label: macos
            os: ${{ vars.RUNNER_CARGO_MACOS || 'macos-latest' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Cache compiled binaries too. Same-PR pushes that don't
          # touch Rust deps get a warm `target/` and skip the 4-minute
          # cargo build entirely; the first push still pays cold cost.
          cache-bin: "true"
          # Save on PRs too. Swatinem keys the cache on Cargo.lock +
          # toolchain hash, so successive pushes to the same PR reuse
          # the slot rather than thrashing the 10GB repo cache budget.
          save-if: true
      - name: Install tmux
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y tmux
          else
            brew install tmux
          fi
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      # tests/integration/acp_smoke.rs spawns the Node ACP shim under
      # acp-worker/test-shim/. The shim depends on @agentclientprotocol/sdk,
      # so its deps must be installed before `cargo test --features serve`
      # runs. The shim itself auto-skips if node is missing, but on a
      # GitHub runner node is always present; without the install step
      # the shim crashes before the ACP handshake completes. macOS only
      # runs --lib --bins (no integration crates), so the shim isn't
      # exercised there and we can skip the install.
      - name: Install ACP shim deps
        if: runner.os == 'Linux'
        working-directory: acp-worker/test-shim
        run: npm ci
      # `--features serve` is a strict superset of the default-feature
      # suite (1759 -> 2269 unit tests, 67 -> 72 e2e), so a single run
      # under serve covers both feature gates. macOS-specific code lives
      # in src/process/macos.rs plus one cfg in container_config.rs;
      # the integration and e2e crates exercise OS-portable code that
      # the Linux leg already covers, so macOS only runs --lib --bins.
      - name: Cargo test (Linux, full suite incl. integration + e2e)
        if: runner.os == 'Linux'
        run: cargo test --features serve
      - name: Cargo test (macOS, lib + bins only)
        if: runner.os == 'macOS'
        run: cargo test --features serve --lib --bins

  macos-acp-e2e:
    # The acp live-daemon e2e tests exercise the structured-view
    # daemon -> runner -> ACP-handshake -> prompt path, which has genuinely
    # OS-divergent behavior: unix-socket sun_path limits (104 on macOS vs
    # 108 on Linux), /tmp vs /private/tmp resolution, and setsid /
    # detached-spawn plus node cold-start timing. The `cargo` job above runs
    # only --lib --bins on macOS, so a macOS-only failure that lives in the
    # e2e crate (e.g. #1890) was structurally outside CI's reach. This job
    # closes that gap by running just the acp e2e modules on macOS. The fake
    # ACP agent is self-contained (web/tests/helpers/fakeAcpAgent.mjs uses
    # only `node:` builtins), so no npm install is needed beyond the web
    # bundle build.rs builds for --features serve.
    name: macOS acp e2e
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: "true"
          save-if: true
      - name: Install tmux
        run: brew install tmux
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Cargo test (macOS, acp live-daemon e2e)
        run: cargo test --features serve --test e2e -- acp_ --test-threads=1 --nocapture

  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Run Vitest with coverage
        working-directory: web
        run: npm run test:unit -- --coverage --reporter=default --reporter=junit --outputFile.junit=test-report.junit.xml
      # Vitest's v8 coverage reporter emits LCOV paths relative to the
      # vitest cwd (web/), so SF: lines read "SF:src/...". Codecov
      # matches file paths against the PR diff, which uses repo-root
      # paths ("web/src/..."), so without this fixup new component
      # files report 0% coverage even when vitest hit 85%. The
      # Playwright coverage merge script already emits "web/src/..."
      # paths, so only the vitest LCOV needs the prefix.
      - name: Rewrite LCOV paths for codecov
        if: ${{ !cancelled() }}
        run: sed -i 's|^SF:src/|SF:web/src/|' web/coverage/vitest/lcov.info
      - name: Upload to Codecov (vitest flag)
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # The codecov-action's `files` input is additive, not restrictive:
          # with `disable_search: false` (the default), the CLI also walks
          # the workspace and uploads anything that looks like a coverage
          # report. That picks up web/tests/coverage-matrix.json and
          # coverage-matrix.exempt.json (our test-mapping metadata, not
          # coverage data) and ships them to Codecov on every run.
          # `disable_search: true` restricts the upload to the explicit
          # `files:` list.
          disable_search: true
          files: web/coverage/vitest/lcov.info
          flags: vitest
          name: vitest
          fail_ci_if_error: false
      - name: Upload test results to Codecov (vitest)
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: web/test-report.junit.xml
          flags: vitest
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: vitest-coverage
          path: web/coverage/vitest/
          retention-days: 14

  bundle-analysis:
    name: Bundle Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: web
        run: npm ci
      # Clean production build, intentionally WITHOUT AOE_COVERAGE: the inline
      # sourcemaps the coverage build emits inflate chunk sizes and would
      # report bogus bundle stats. The @codecov/vite-plugin uploads bundle
      # stats to Codecov
      # when CODECOV_TOKEN is present (gated in web/vite.config.ts); without
      # the token the plugin is a no-op, so forks still build cleanly.
      - name: Build web bundle and upload stats to Codecov
        working-directory: web
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: npm run build

  playwright:
    name: Playwright (mocked)
    # Same Blacksmith-with-fallback scheme as the cargo job: clear
    # RUNNER_PLAYWRIGHT_MOCKED to drop to the free GitHub runner.
    runs-on: ${{ vars.RUNNER_PLAYWRIGHT_MOCKED || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Build web with coverage instrumentation
        working-directory: web
        env:
          AOE_COVERAGE: '1'
        run: npm run build
      - name: Validate coverage matrix
        working-directory: web
        run: node tests/validate-coverage-matrix.mjs
      # The Playwright browser cache (~150MB chromium) is keyed on the
      # web/package-lock.json hash so it invalidates when @playwright/test
      # bumps. --with-deps is omitted: the ubuntu-latest runner image
      # already ships the apt packages Chromium needs.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: web
        run: npx playwright install chromium
      - name: Run Playwright (mocked) with coverage
        working-directory: web
        env:
          AOE_COVERAGE: '1'
        run: npx playwright test --config=playwright.config.ts
      - name: Build LCOV from collected Playwright coverage
        working-directory: web
        if: ${{ !cancelled() }}
        run: npm run coverage:merge
      - name: Upload to Codecov (playwright-mocked flag)
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # See the matching comment in the vitest upload step: without
          # disable_search the action also picks up the coverage-matrix
          # JSON files under web/tests/ and ships them as if they were
          # coverage reports.
          disable_search: true
          files: web/coverage/merged/lcov.info
          flags: playwright-mocked
          name: playwright-mocked
          fail_ci_if_error: false
      - name: Upload test results to Codecov (playwright-mocked)
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: web/test-report.junit.xml
          flags: playwright-mocked
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-mocked-coverage
          path: web/coverage/merged/
          retention-days: 14

  playwright-live:
    # Sharded 2-way: each shard is a free 4-core runner running half the
    # suite at the same 3-worker density, so wall-clock roughly halves
    # without changing per-runner contention. The required-check context
    # is the fan-in `playwright-live-ok` job below (named "Playwright
    # (live)"), NOT these shard jobs; keep that in sync with the branch
    # ruleset if the shard count changes.
    name: Playwright (live, shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Cache compiled binaries too. Same-PR pushes that don't
          # touch Rust deps get a warm `target/` and skip the 4-minute
          # cargo build entirely; the first push still pays cold cost.
          cache-bin: "true"
          # Save on PRs too. Swatinem keys the cache on Cargo.lock +
          # toolchain hash, so successive pushes to the same PR reuse
          # the slot rather than thrashing the 10GB repo cache budget.
          save-if: true
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      # Debug build instead of --release: --release with LTO and
      # codegen-units=1 cost ~6 min on the GitHub runner; debug builds
      # the same binary in ~2 min with no relevant runtime difference
      # for e2e tests. The harness derives the tmux prefix from the
      # binary path (aoe_dev_ for debug, aoe_ for release) so specs
      # don't hard-code either.
      - name: Build aoe with instrumented web bundle
        env:
          AOE_COVERAGE: '1'
        run: cargo build --features serve
      - name: Install web deps
        working-directory: web
        run: npm ci
      # Same scheme as the mocked job: cache Chromium under
      # ~/.cache/ms-playwright, key on the lockfile, skip --with-deps
      # because ubuntu-latest already has the apt prerequisites.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: web
        run: npx playwright install chromium
      - name: Run live Playwright with coverage
        working-directory: web
        env:
          AOE_COVERAGE: '1'
          AOE_E2E_BINARY: ${{ github.workspace }}/target/debug/aoe
        run: npx playwright test --config=playwright.live.config.ts --shard=${{ matrix.shard }}/2
      - name: Build LCOV from collected Playwright coverage
        working-directory: web
        if: ${{ !cancelled() }}
        run: npm run coverage:merge
      - name: Upload to Codecov (playwright-live flag)
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # See the matching comment in the vitest upload step: without
          # disable_search the action also picks up the coverage-matrix
          # JSON files under web/tests/ and ships them as if they were
          # coverage reports. Codecov merges the two shard uploads that
          # share the playwright-live flag on the same commit.
          disable_search: true
          files: web/coverage/merged/lcov.info
          flags: playwright-live
          name: playwright-live-shard-${{ matrix.shard }}
          fail_ci_if_error: false
      - name: Upload test results to Codecov (playwright-live)
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: web/test-report.junit.xml
          flags: playwright-live
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-live-report-shard-${{ matrix.shard }}
          path: web/playwright-live-report/
          retention-days: 14
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-live-coverage-shard-${{ matrix.shard }}
          path: web/coverage/merged/
          retention-days: 14

  playwright-live-ok:
    # Fan-in for the branch ruleset: "Playwright (live)" is a required
    # status check, and matrix jobs report per-shard contexts that the
    # ruleset doesn't know about. This job carries the stable context
    # name and fails unless every shard succeeded.
    name: Playwright (live)
    needs: playwright-live
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check shard results
        run: |
          if [ "${{ needs.playwright-live.result }}" != "success" ]; then
            echo "live shards result: ${{ needs.playwright-live.result }}"
            exit 1
          fi
