# Codecov configuration for agent-of-empires.
#
# Scope today: web/ frontend only (Vitest unit tests + Playwright mocked +
# Playwright live, all merged into one LCOV by web/scripts/merge-coverage.mjs).
# Rust backend coverage (cargo-llvm-cov or tarpaulin) is queued as a
# follow-up; when it lands, add a `cargo` flag and additional components
# scoped under src/**.
#
# Components segment the web frontend by user-facing surface so the PR
# comment shows exactly which area moved (or regressed). Targets are 90%
# project + patch with a 1% threshold; first PRs after the foundation
# merges will run well below this, so the report-only philosophy lives
# in the Codecov "informational" flag at the project level until the
# follow-ups (#1217-#1224) lift the baseline.
# Touched 2026-05-28 to force another YAML re-resolve after reinstalling the Codecov GitHub App on the agent-of-empires org. The 2026-05-27 touch happened before the App install was completed; per-PR processing was still falling back to defaults (bare-bones comment, missing codecov/project status) because the "Current bot" field on the Codecov repo config page stayed at "none".

comment:
  layout: "header, diff, files, components, sunburst, uncovered, footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: false
  hide_project_coverage: false

codecov:
  # Both LCOV sources already emit repo-root paths ("web/src/..."): the vitest
  # job rewrites SF: prefixes and the Playwright merge script writes them
  # directly. Codecov's default path fixer was re-mapping those and dropping
  # per-line hits for changed web/src files (patch coverage showed freshly
  # tested lines, and even comment lines, as missed). Disabling it makes
  # Codecov trust the paths as uploaded. (#2157)
  disable_default_path_fixes: true
  # Hold all Codecov notifications (PR comment + status checks) until every
  # coverage upload has landed. Counts UPLOADS, not flags: vitest (1) +
  # playwright-mocked (1) + playwright-live (2, one per shard) = 4. With a
  # lower number Codecov posts mid-run, before the last live shard reports,
  # so the comment/status reflect partial coverage. Keep this in sync with
  # the playwright-live shard count (`shard: [1, 2]` in tests.yml).
  # `wait_for_ci: true` additionally holds notifications until GitHub Actions
  # reports the workflow done, so a hung uploader cannot trigger a premature
  # evaluation either.
  notify:
    after_n_builds: 4
    wait_for_ci: true

# One flag per test type. Each CI job uploads its own LCOV with its own
# flag, and Codecov merges them server-side into the combined coverage
# report (see https://docs.codecov.com/docs/flags). `carryforward: true`
# means a flag whose job did not run on a given PR (e.g. docs-only PR
# skipping playwright-live) does not zero out that slice; the last
# known value carries forward instead.
flags:
  vitest:
    paths:
      - web/src/
    carryforward: true
  playwright-mocked:
    paths:
      - web/src/
    carryforward: true
  playwright-live:
    paths:
      - web/src/
    carryforward: true

component_management:
  default_rules:
    # No per-component GitHub status checks. Components still appear
    # in the codecov PR comment under the "components" layout block
    # so authors see which surface moved, but we don't spam the merge
    # box with a separate row per component. The repo-wide gates are
    # enforced by the aggregate `codecov/project` and `codecov/patch`
    # statuses defined under `coverage.status` below.
    statuses: []
  individual_components:
    # ============================================================
    # STRUCTURED VIEW (native structured rendering)
    # ============================================================
    - component_id: "structured-view-ui"
      name: "Structured View UI"
      paths:
        - "web/src/components/acp/**"

    # ============================================================
    # DIFF VIEWER + COMMENTS
    # ============================================================
    - component_id: "diff-viewer"
      name: "Diff Viewer"
      paths:
        - "web/src/components/diff/**"

    # ============================================================
    # SESSION WIZARD
    # ============================================================
    - component_id: "session-wizard"
      name: "Session Wizard"
      paths:
        - "web/src/components/session-wizard/**"

    # ============================================================
    # SETTINGS (panels under settings/ + standalone settings components)
    # ============================================================
    - component_id: "settings"
      name: "Settings"
      paths:
        - "web/src/components/settings/**"
        - "web/src/components/NotificationSettings.tsx"
        - "web/src/components/SecuritySettings.tsx"
        - "web/src/components/SettingsView.tsx"
        - "web/src/components/TerminalSettings.tsx"
        - "web/src/components/McpServers.tsx"

    # ============================================================
    # AUTH (LoginPage, TokenEntryPage, ElevationPrompt)
    # ============================================================
    - component_id: "auth"
      name: "Auth"
      paths:
        - "web/src/components/LoginPage.tsx"
        - "web/src/components/TokenEntryPage.tsx"
        - "web/src/components/ElevationPrompt.tsx"

    # ============================================================
    # DASHBOARD + SESSION SIDEBAR + LIFECYCLE
    # ============================================================
    - component_id: "dashboard-sidebar"
      name: "Dashboard + Sidebar"
      paths:
        - "web/src/components/Dashboard.tsx"
        - "web/src/components/WorkspaceSidebar.tsx"
        - "web/src/components/DeleteSessionDialog.tsx"
        - "web/src/components/StopSessionDialog.tsx"
        - "web/src/components/SessionGroupModal.tsx"
        - "web/src/components/BulkActionBar.tsx"
        - "web/src/components/SidebarSortPicker.tsx"
        - "web/src/components/TopBar.tsx"
        - "web/src/components/ProjectsView.tsx"

    # ============================================================
    # RIGHT PANEL + TERMINAL VIEW
    # ============================================================
    - component_id: "right-panel-terminal"
      name: "Right Panel + Terminal"
      paths:
        - "web/src/components/RightPanel.tsx"
        - "web/src/components/TerminalView.tsx"
        - "web/src/components/XtermTerminalView.tsx"
        - "web/src/components/LiveTerminalView.tsx"
        - "web/src/components/MobileLiveTerminal.tsx"
        - "web/src/components/TerminalSessionStack.tsx"
        - "web/src/components/PairedTerminal.tsx"
        - "web/src/components/TerminalConnectionBanners.tsx"
        - "web/src/components/ContentSplit.tsx"
        - "web/src/components/MobileMainPane.tsx"
        - "web/src/components/MobileRightPanelPicker.tsx"
        - "web/src/components/MobileTerminalToolbar.tsx"
        - "web/src/components/KeyboardFab.tsx"

    # ============================================================
    # DIRECTORY BROWSER + CONNECTED DEVICES + DISCONNECT BANNER
    # ============================================================
    - component_id: "ancillary-views"
      name: "Directory Browser, Devices, Connectivity"
      paths:
        - "web/src/components/DirectoryBrowser.tsx"
        - "web/src/components/ConnectedDevices.tsx"
        - "web/src/components/DisconnectBanner.tsx"
        - "web/src/components/UpdateBanner.tsx"
        - "web/src/components/DashboardUpdateBanner.tsx"

    # ============================================================
    # MODALS
    # ============================================================
    - component_id: "modals"
      name: "Modals"
      paths:
        - "web/src/components/AboutModal.tsx"
        - "web/src/components/HelpOverlay.tsx"
        - "web/src/components/TelemetryConsentModal.tsx"

    # ============================================================
    # COMMAND PALETTE
    # ============================================================
    - component_id: "command-palette"
      name: "Command Palette"
      paths:
        - "web/src/components/command-palette/**"
        - "web/src/components/PaletteTriggerPill.tsx"

    # ============================================================
    # APP SHELL (App.tsx, main.tsx, routing, primitives)
    # ============================================================
    - component_id: "app-shell"
      name: "App Shell"
      paths:
        - "web/src/App.tsx"
        - "web/src/main.tsx"
        - "web/src/logging-init.ts"
        - "web/src/components/ErrorBoundary.tsx"
        - "web/src/components/OverflowMenu.tsx"
        - "web/src/components/OwnerAvatar.tsx"
        - "web/src/components/StatusGlyph.tsx"
        - "web/src/components/Tooltip.tsx"
        - "web/src/components/Toasts.tsx"

    # ============================================================
    # HOOKS (React hooks layer; cross-cuts every UI component)
    # ============================================================
    - component_id: "hooks"
      name: "Hooks"
      paths:
        - "web/src/hooks/**"

    # ============================================================
    # LIB (API client, utilities, shared logic)
    # ============================================================
    - component_id: "lib"
      name: "Lib (API client + utils)"
      paths:
        - "web/src/lib/**"

coverage:
  status:
    project:
      default:
        # Project status compares the whole repo's coverage against the
        # base (auto-resolved to main on PRs). `auto` target means
        # "don't drop below where main is today", which is the right
        # behavior while the baseline climbs from the foundation
        # baseline (~16%) toward the 90% goal across follow-ups
        # #1217-#1224. The hard 90% target is enforced on `patch` below.
        target: auto
        threshold: 1%
        base: auto
        if_ci_failed: error
        informational: false
        only_pulls: false
    patch:
      default:
        # New / changed code on a PR must hit 75% coverage. The eventual
        # end-state is 90% (tracked in #1225, the threshold-enforcement
        # follow-up), but the foundation PR adds tiny TSX deltas alongside
        # large test infrastructure, where a single unhit line can tank a
        # short-patch ratio. 75% leaves room for one missed line on small
        # patches while still requiring that most new code be covered.
        target: 75%
        threshold: 1%
        base: auto
        if_ci_failed: error

github_checks:
  annotations: true
